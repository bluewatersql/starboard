[pytest]
# Root pytest configuration for integration tests
# Individual packages have their own pytest configuration in pyproject.toml

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --import-mode=importlib

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests across multiple packages
    slow: Tests that take significant time
    requires_databricks: Tests that need Databricks connection
    requires_llm: Tests that need LLM API access
    baseline: Baseline tests to ensure backward compatibility (Phase 0)
    golden: Golden/snapshot tests for transformers
    memory: Memory usage benchmarks and profiling tests

asyncio_mode = auto

# Ignore package test directories (they have their own configs)
norecursedirs = 
    packages/*/tests
    .git
    .pytest_cache
    __pycache__
    *.egg-info
    dist
    build
    node_modules

