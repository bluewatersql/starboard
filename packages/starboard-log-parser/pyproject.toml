[project]
name = "starboard-log-parser"
version = "0.1.0"
description = "Spark event log parser with multi-cloud support"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "DBRX"}
dependencies = [
    "orjson>=3.11.4",
    "stream-unzip>=0.0.94",
    "numpy>=2.0.0,<3.0.0",
]

[project.optional-dependencies]
# HTTP loader support
http = [
    "httpx>=0.28.1",
]

# Databricks DBFS and Unity Catalog Volumes support
databricks = [
    "databricks-sdk>=0.60.0",
]

# AWS S3 support (future)
aws = [
    "boto3>=1.34.0",
]

# Azure ADLS support (future)
azure = [
    "azure-storage-file-datalake>=12.14.0",
    "azure-identity>=1.15.0",
]

# GCP GCS support (future)
gcp = [
    "google-cloud-storage>=2.14.0",
]

# All cloud loaders
all-clouds = [
    "starboard-log-parser[http,databricks,aws,azure,gcp]",
]

# Testing dependencies
test = [
    "pytest>=8.4.2",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-benchmark>=4.0.0",
    "syrupy>=4.6.0",  # Snapshot testing
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatchling.build.targets.wheel]
packages = ["starboard_log_parser"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=starboard_log_parser",
    "--cov-report=term-missing",
    "--cov-report=html",
]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (may require external services)",
    "slow: Tests that take significant time",
    "baseline: Baseline tests to ensure backward compatibility",
]
asyncio_mode = "auto"

