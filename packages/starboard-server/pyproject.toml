[project]
name = "starboard-server"
version = "0.1.0"
description = "Starboard AI Agent - FastAPI Backend Server"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "DBRX"}
dependencies = [
    "starboard-core", # Workspace dependency
    "starboard-log-parser[databricks,http]", # Workspace dependency - Log parser
    # FastAPI stack
    # >=0.128.0 ensures starlette>=1.3.1, fixing CVE batch: GHSA-82w8-qh3p-5jfq (DoS, CVSS 7.5),
    # GHSA-86qp-5c8j-p5mr (host header poisoning), GHSA-wqp7-x3pw-xc5r (SSRF/NTLM),
    # GHSA-jp82-jpqv-5vv3 (URL hostname poisoning), GHSA-x746-7m8f-x49c (arbitrary HTTP methods),
    # PYSEC-2026-161 (BadHost) — see F-3-1b-002; takes effect after uv lock --refresh
    "fastapi>=0.128.0,<1.0.0",
    "uvicorn[standard]>=0.24.0,<1.0.0",
    # >=0.0.31 fixes GHSA-wp53-j4wj-2cfg (arbitrary file write, CVSS 8.2),
    # GHSA-5rvq-cxj2-64vf (CPU DoS), GHSA-pp6c-gr5w-3c5g (DoS via multipart headers),
    # GHSA-6jv3-5f52-599m (parameter smuggling), GHSA-mj87-hwqh-73pj (DoS preamble),
    # GHSA-v9pg-7xvm-68hf (negative Content-Length) — see F-3-1b-003; takes effect after uv lock --refresh
    "python-multipart>=0.0.31",
    # Databricks & LLM
    "databricks-sdk>=0.73.0,<1.0.0",
    "databricks-sql-connector>=3.0.0",
    "openai>=2.6.0,<3.0.0",
    "tiktoken>=0.12.0",
    # Data processing
    "polars>=1.17.0,<2.0.0",
    "pyarrow>=18.0.0,<20.0.0", # Required for Arrow format with Databricks + Polars integration
    "numpy>=1.24.0,<3.0.0",
    "sqlglot>=27.29.0,<28.0.0",
    # Data visualization (FinOps charts)
    "altair>=5.0.0,<6.0.0", # Declarative visualization with Vega-Lite
    "vl-convert-python>=1.0.0,<2.0.0", # Convert Vega-Lite to PNG/SVG
    # Prompt templating
    "Jinja2>=3.1.0",
    # Configuration
    "pydantic>=2.0.0,<3.0.0",
    "pydantic-settings>=2.0.0,<3.0.0",
    # Infrastructure
    "httpx>=0.28.1,<1.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "pyyaml>=6.0.3",
    "rich>=13.0.0,<14.0.0",
    "structlog>=24.0.0",
    "redis>=5.0.0,<6.0.0",
    "slowapi>=0.1.9,<1.0.0", # Rate limiting for FastAPI
    # Database (State Management)
    "asyncpg>=0.29.0,<1.0.0", # Async Postgres driver
    "pgvector>=0.3.0,<1.0.0", # Vector similarity search extension
    "aiosqlite>=0.19.0,<1.0.0", # Async SQLite driver for dev/testing
    "sqlite-vec>=0.1.1,<1.0.0", # Vector similarity search for SQLite
    # Security: pin cryptography to avoid PYSEC-2026-36 RCE (CVSS 9.8)
    "cryptography>=48.0.1,<49.0.0",  # pinned for PYSEC-2026-36 RCE — see changes/oss_readiness/
    # MCP protocol
    "mcp>=1.19.0,<2.0.0",
    "orjson>=3.11.4",
    "aiofiles>=24.1",
    # Observability (core tracing used unconditionally by adapters/infra)
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
]

[project.optional-dependencies]
observability = [
    "opentelemetry-instrumentation-fastapi>=0.41b0",
    "prometheus-client>=0.19.0",
]

test = [
    # Core testing framework
    "pytest>=8.4.2",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "pytest-xdist>=3.5.0",  # Parallel test execution
    
    # Advanced testing (Week 3)
    "syrupy>=4.6.0",  # Snapshot/golden testing
    "pytest-benchmark>=4.0.0",  # Performance benchmarking
    "hypothesis>=6.92.0",  # Property-based testing
    
    # Test utilities
    "httpx>=0.28.1",
    "respx>=0.22.0",  # Mock httpx requests for testing
    "faker>=28.0.0",  # Generate test data
    "freezegun>=1.5.0",  # Mock datetime
    
    "types-aiofiles>=24.1",
]

lint = [
    "mypy>=1.10.0",
    "ruff>=0.4.0",  # Formatting and linting
]

load = [
    "locust>=2.0.0",
]

dev = [
    "uvicorn[standard]>=0.24.0",
    "playwright>=1.40.0",  # Browser automation for debug logging
]

all = [
    "starboard-server[test,lint,observability,dev,load]",
]

[project.scripts]
starboard-server = "starboard_server.main:run"
starboard-mcp = "starboard_server.mcp.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatchling.build.targets.wheel]
packages = ["starboard_server"]

# Include data files in package distribution
[tool.hatchling.build.targets.wheel.shared-data]
"starboard_server/tools/domain/analytics/data" = "starboard_server/tools/domain/analytics/data"

[tool.hatchling.build.targets.sdist]
include = [
    "starboard_server/**/*.py",
    "starboard_server/tools/domain/analytics/data/*.json",
]

[tool.mypy]
exclude = [
    "experiment/",  # Exclude experiment folder (prototype code)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=starboard_server",
    "--cov-report=term-missing",
    "--cov-report=html",
]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (may require external services)",
    "golden: Golden/snapshot tests for prompts and schemas",
    "slow: Tests that take significant time",
    "baseline: Baseline tests to ensure backward compatibility (Phase 0)",
]
asyncio_mode = "auto"

