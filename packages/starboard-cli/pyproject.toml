[project]
name = "starboard-cli"
version = "0.1.0"
description = "Starboard AI Agent - Command-line Interface"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "starboard-core",    # Workspace dependency
    "starboard-server",  # Server components (agents, adapters)
    
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
    "pyyaml>=6.0.3",
    "structlog>=24.0.0",
    "aiosqlite>=0.19.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.4.2",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
starboard = "starboard_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatchling.build.targets.wheel]
packages = ["starboard_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--cov=starboard_cli",
    "--cov-report=term-missing",
]
markers = [
    "unit: Unit tests (fast, isolated)",
    "cli: CLI interaction tests",
]
asyncio_mode = "auto"

